<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <filter id="paper-texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" seed="2" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="graynoise"/>
      <feBlend in="SourceGraphic" in2="graynoise" mode="multiply" result="textured"/>
    </filter>
    <filter id="ink-bleed">
      <feMorphology operator="dilate" radius="0.3"/>
      <feGaussianBlur stdDeviation="0.2"/>
    </filter>
    <linearGradient id="paper-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e6"/>
      <stop offset="50%" stop-color="#ede8dc"/>
      <stop offset="100%" stop-color="#e8e2d4"/>
    </linearGradient>
    <pattern id="halftone" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.6" fill="#00000008"/>
    </pattern>
  </defs>

  <!-- Paper background -->
  <rect width="1280" height="400" fill="url(#paper-grad)"/>
  <rect width="1280" height="400" fill="url(#halftone)"/>

  <!-- Aged edges -->
  <rect x="0" y="0" width="1280" height="3" fill="#d4cbbf" opacity="0.5"/>
  <rect x="0" y="397" width="1280" height="3" fill="#c4b8a8" opacity="0.5"/>

  <!-- Ornamental top rule -->
  <rect x="80" y="45" width="1120" height="2.5" fill="#2a2520"/>
  <rect x="80" y="51" width="1120" height="0.8" fill="#2a2520"/>

  <!-- Corner flourishes -->
  <path d="M80,42 Q80,32 90,32 L110,32" stroke="#2a2520" stroke-width="1.5" fill="none"/>
  <path d="M80,42 Q80,32 70,32" stroke="#2a2520" stroke-width="1.5" fill="none" transform="translate(1120,0)"/>
  <circle cx="640" cy="46" r="4" fill="#2a2520"/>
  <circle cx="620" cy="46" r="2" fill="#2a2520"/>
  <circle cx="660" cy="46" r="2" fill="#2a2520"/>

  <!-- Volume/date line -->
  <text x="120" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#6b6358" letter-spacing="2">VOL. I</text>
  <text x="1160" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#6b6358" letter-spacing="2" text-anchor="end">OPEN SOURCE</text>
  <text x="640" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#6b6358" letter-spacing="1.5" text-anchor="middle">A CODING PHILOSOPHY FOR THE AGE OF AI</text>

  <!-- Thin rule below volume line -->
  <rect x="120" y="90" width="1040" height="0.5" fill="#9a9083"/>

  <!-- Main masthead -->
  <text x="640" y="195" font-family="Georgia, 'Playfair Display', 'Times New Roman', serif" font-size="96" font-weight="900" fill="#1a1814" text-anchor="middle" letter-spacing="-1" filter="url(#ink-bleed)">Primera Plana</text>

  <!-- Decorative rule below masthead -->
  <rect x="180" y="220" width="920" height="2.5" fill="#2a2520"/>
  <rect x="280" y="227" width="720" height="0.8" fill="#2a2520"/>

  <!-- Subtitle -->
  <text x="640" y="275" font-family="Georgia, 'Libre Baskerville', 'Times New Roman', serif" font-size="22" font-style="italic" fill="#4a4036" text-anchor="middle" letter-spacing="0.5">Code That Reads Like a Front Page</text>

  <!-- Bottom description -->
  <text x="640" y="320" font-family="'Courier New', 'IBM Plex Mono', monospace" font-size="13" fill="#7a7062" text-anchor="middle" letter-spacing="1.2">PUBLIC METHODS ARE HEADLINES  &#x2022;  COMPLEXITY LIVES IN THE LEAVES  &#x2022;  THE READER DECIDES THEIR DEPTH</text>

  <!-- Bottom ornamental rule -->
  <rect x="80" y="348" width="1120" height="0.8" fill="#2a2520"/>
  <rect x="80" y="353" width="1120" height="2.5" fill="#2a2520"/>

  <!-- Bottom corner flourishes -->
  <path d="M80,358 Q80,368 90,368 L110,368" stroke="#2a2520" stroke-width="1.5" fill="none"/>
  <path d="M1200,358 Q1200,368 1190,368 L1170,368" stroke="#2a2520" stroke-width="1.5" fill="none"/>
  <circle cx="640" cy="353" r="4" fill="#2a2520"/>
  <circle cx="620" cy="353" r="2" fill="#2a2520"/>
  <circle cx="660" cy="353" r="2" fill="#2a2520"/>
</svg>
